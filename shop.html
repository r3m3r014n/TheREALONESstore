<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | THE REALONES STORE | Luxury Fashion Kenya</title>
    <meta name="description" content="Shop premium women's fashion. Designer dresses, evening wear, streetwear, loungewear & accessories. Nationwide delivery in Kenya.">
    <meta name="keywords" content="shop luxury fashion Kenya, buy designer dresses, women's clothing online Kenya, evening wear shop">
    <link rel="canonical" href="https://therealonestore.co.ke/shop.html">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#d4af37',
                        'gold-light': '#f4e4ba',
                        charcoal: '#1a1a1a',
                        dark: '#0a0a0a',
                    },
                    fontFamily: {
                        playfair: ['Playfair Display', 'serif'],
                        rajdhani: ['Rajdhani', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-dark text-white font-rajdhani">
    <!-- Navigation -->
    <nav class="fixed top-0 w-full bg-dark/90 backdrop-blur-xl border-b border-gold/30 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="font-playfair text-2xl font-bold text-gold tracking-widest">THE REALONES</a>
            <div class="hidden md:flex items-center gap-8">
                <a href="index.html" class="text-white/80 hover:text-gold transition-colors uppercase tracking-wider text-sm font-semibold">Home</a>
                <a href="shop.html" class="text-gold uppercase tracking-wider text-sm font-semibold">Shop</a>
                <a href="about.html" class="text-white/80 hover:text-gold transition-colors uppercase tracking-wider text-sm font-semibold">About</a>
                <a href="contact.html" class="text-white/80 hover:text-gold transition-colors uppercase tracking-wider text-sm font-semibold">Contact</a>
                <button onclick="toggleCart()" class="relative text-gold text-2xl hover:scale-110 transition-transform">
                    🛒
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-gold text-dark text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
                </button>
            </div>
            <button onclick="toggleMobileMenu()" class="md:hidden text-gold text-2xl">☰</button>
        </div>
        <div id="mobileMenu" class="hidden md:hidden absolute top-full left-0 w-full bg-dark/95 backdrop-blur-xl border-b border-gold/30 p-6 flex-col gap-4">
            <a href="index.html" class="text-white/80 uppercase tracking-wider">Home</a>
            <a href="shop.html" class="text-gold uppercase tracking-wider font-semibold">Shop</a>
            <a href="about.html" class="text-white/80 uppercase tracking-wider">About</a>
            <a href="contact.html" class="text-white/80 uppercase tracking-wider">Contact</a>
        </div>
    </nav>

    <!-- Shop Header -->
    <section class="pt-32 pb-12 px-4 text-center">
        <p class="font-playfair text-gold italic text-xl tracking-widest mb-2">20+ Exclusive Pieces</p>
        <h1 class="font-playfair text-4xl md:text-5xl font-bold text-white mb-4">The Collection</h1>
        <div class="w-24 h-0.5 bg-gradient-to-r from-gold to-gold-light mx-auto"></div>
        
        <!-- Filters -->
        <div class="flex flex-wrap justify-center gap-4 mt-8 max-w-2xl mx-auto">
            <button onclick="filterProducts('all')" class="filter-btn active px-4 py-2 border border-gold/30 rounded-full text-sm uppercase tracking-wider hover:bg-gold hover:text-dark transition-all" data-filter="all">All</button>
            <button onclick="filterProducts('Streetwear')" class="filter-btn px-4 py-2 border border-gold/30 rounded-full text-sm uppercase tracking-wider hover:bg-gold hover:text-dark transition-all" data-filter="Streetwear">Streetwear</button>
            <button onclick="filterProducts('Evening')" class="filter-btn px-4 py-2 border border-gold/30 rounded-full text-sm uppercase tracking-wider hover:bg-gold hover:text-dark transition-all" data-filter="Evening">Evening</button>
            <button onclick="filterProducts('Casual')" class="filter-btn px-4 py-2 border border-gold/30 rounded-full text-sm uppercase tracking-wider hover:bg-gold hover:text-dark transition-all" data-filter="Casual">Casual</button>
            <button onclick="filterProducts('Formal')" class="filter-btn px-4 py-2 border border-gold/30 rounded-full text-sm uppercase tracking-wider hover:bg-gold hover:text-dark transition-all" data-filter="Formal">Formal</button>
        </div>
    </section>

    <!-- Products Grid -->
    <section class="py-12 px-4 max-w-7xl mx-auto">
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Populated by JS -->
        </div>
    </section>

    <!-- Product Modal -->
    <div id="productModal" class="fixed inset-0 bg-black/95 backdrop-blur-sm z-50 hidden items-center justify-center p-4" onclick="if(event.target === this) closeModal()">
        <div class="bg-charcoal border border-gold/30 rounded-2xl max-w-lg w-full p-6 relative max-h-[90vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gold text-3xl hover:rotate-90 transition-transform w-10 h-10 flex items-center justify-center border border-gold/30 rounded-full hover:bg-gold hover:text-dark">×</button>
            <img id="modalImg" src="" alt="" class="w-full h-64 object-cover rounded-xl mb-4 bg-gradient-to-br from-gold/10 to-dark border border-gold/20" loading="lazy">
            <span id="modalBadge" class="inline-block px-3 py-1 bg-gold text-dark text-xs font-bold uppercase rounded mb-2 hidden"></span>
            <h3 id="modalName" class="font-playfair text-2xl text-white mb-2"></h3>
            <p id="modalCategory" class="text-gold text-sm uppercase tracking-wider mb-2"></p>
            <p id="modalPrice" class="text-gold text-2xl font-bold mb-4"></p>
            <p id="modalDesc" class="text-white/70 mb-6 leading-relaxed"></p>
            <button onclick="addFromModal()" class="w-full py-4 bg-gold text-dark font-bold uppercase tracking-widest hover:bg-gold-light transition-all rounded-lg">Add to Cart</button>
        </div>
    </div>

    <!-- Cart Sidebar -->
    <div id="cartSidebar" class="fixed top-0 right-0 w-full md:w-96 h-full bg-charcoal/95 backdrop-blur-xl border-l border-gold/30 z-50 transform translate-x-full transition-transform duration-300 p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6 border-b border-gold/30 pb-4">
            <h3 class="font-playfair text-gold text-2xl uppercase tracking-widest">Your Cart</h3>
            <button onclick="toggleCart()" class="text-gold text-3xl hover:rotate-90 transition-transform">×</button>
        </div>
        <div id="cartItems" class="space-y-4">
            <p class="text-white/50 text-center italic mt-8">Your cart is empty</p>
        </div>
        <div class="mt-6 pt-6 border-t border-gold/30">
            <div id="cartTotal" class="font-playfair text-gold text-3xl text-center mb-4">KES 0</div>
            <button onclick="checkout()" id="checkoutBtn" disabled class="w-full py-4 border-2 border-gold text-gold font-bold uppercase tracking-widest hover:bg-gold hover:text-dark transition-all disabled:opacity-30">Checkout via WhatsApp</button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark border-t border-gold/30 py-12 px-4 mt-20">
        <div class="max-w-6xl mx-auto grid sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <div>
                <h3 class="font-playfair text-gold text-xl mb-4">THE REALONES STORE</h3>
                <p class="text-white/60 text-sm">Premium women's fashion boutique based in Mombasa.</p>
            </div>
            <div>
                <h3 class="font-playfair text-gold text-xl mb-4">Quick Links</h3>
                <a href="index.html" class="text-white/60 text-sm hover:text-gold block py-1">Home</a>
                <a href="about.html" class="text-white/60 text-sm hover:text-gold block py-1">About</a>
                <a href="contact.html" class="text-white/60 text-sm hover:text-gold block py-1">Contact</a>
            </div>
            <div>
                <h3 class="font-playfair text-gold text-xl mb-4">Contact</h3>
                <p class="text-white/60 text-sm">+254111636725</p>
            </div>
            <div>
                <h3 class="font-playfair text-gold text-xl mb-4">Payment</h3>
                <div class="inline-block px-4 py-2 bg-gold/10 border border-gold/30 rounded-lg text-gold font-bold text-sm">M-Pesa</div>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        // Initialize shop page
        document.addEventListener('DOMContentLoaded', () => {
            renderAllProducts();
        });
        
        let currentFilter = 'all';
        
        function renderAllProducts() {
            const grid = document.getElementById('productGrid');
            const filtered = currentFilter === 'all' ? products : products.filter(p => p.category === currentFilter || p.category.includes(currentFilter));
            grid.innerHTML = filtered.map(product => createProductCard(product)).join('');
        }
        
        function filterProducts(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-gold', 'text-dark');
                if(btn.dataset.filter === category) btn.classList.add('active', 'bg-gold', 'text-dark');
            });
            renderAllProducts();
        }
    </script>
</body>
</html>
